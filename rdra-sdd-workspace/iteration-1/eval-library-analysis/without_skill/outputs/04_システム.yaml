# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# レイヤー4: システム（情報モデル・状態モデル）
# ============================================================

システム:

  # ----------------------------------------------------------
  # 情報モデル（ドメインモデル）
  # ----------------------------------------------------------
  情報モデル:

    - エンティティ: 利用者
      属性:
        - 利用者ID (PK)
        - 社員番号
        - 氏名
        - メールアドレス
        - 利用者種別 (一般会員 | 司書)
        - 登録日
        - ステータス (有効 | 無効)
      関連:
        - "1:N → 貸出"
        - "1:N → 予約"

    - エンティティ: 蔵書
      属性:
        - 蔵書ID (PK)
        - 管理番号 (UNIQUE)
        - ISBN
        - タイトル
        - 著者
        - 出版社
        - 出版年
        - 分類 (NDC等)
        - 配架場所
        - ステータス (貸出可能 | 貸出中 | 予約取置中 | 除籍済)
        - 登録日
        - 除籍日
        - 除籍理由
      関連:
        - "1:N → 貸出"
        - "1:N → 予約"

    - エンティティ: 貸出
      属性:
        - 貸出ID (PK)
        - 蔵書ID (FK)
        - 利用者ID (FK)
        - 貸出日
        - 返却期限日
        - 返却日
        - ステータス (貸出中 | 返却済 | 延滞中)
      関連:
        - "N:1 → 利用者"
        - "N:1 → 蔵書"

    - エンティティ: 予約
      属性:
        - 予約ID (PK)
        - 蔵書ID (FK)
        - 利用者ID (FK)
        - 予約日
        - 予約順位
        - ステータス (予約中 | 取置中 | 貸出済 | 取消済 | 期限切れ)
        - 取置期限日
      関連:
        - "N:1 → 利用者"
        - "N:1 → 蔵書"

  # ----------------------------------------------------------
  # 状態モデル
  # ----------------------------------------------------------
  状態モデル:

    - エンティティ: 蔵書
      状態遷移:
        - from: (初期)
          to: 貸出可能
          イベント: 蔵書登録
        - from: 貸出可能
          to: 貸出中
          イベント: 貸出処理
        - from: 貸出中
          to: 貸出可能
          イベント: 返却処理（予約なし）
        - from: 貸出中
          to: 予約取置中
          イベント: 返却処理（予約あり）
        - from: 予約取置中
          to: 貸出中
          イベント: 予約者への貸出処理
        - from: 予約取置中
          to: 貸出可能
          イベント: 取置期限超過
        - from: 貸出可能
          to: 除籍済
          イベント: 除籍処理
        - from: 予約取置中
          to: 除籍済
          イベント: 除籍処理（特例）

    - エンティティ: 貸出
      状態遷移:
        - from: (初期)
          to: 貸出中
          イベント: 貸出処理
        - from: 貸出中
          to: 返却済
          イベント: 返却処理
        - from: 貸出中
          to: 延滞中
          イベント: 返却期限超過（バッチ）
        - from: 延滞中
          to: 返却済
          イベント: 返却処理

    - エンティティ: 予約
      状態遷移:
        - from: (初期)
          to: 予約中
          イベント: 予約申請
        - from: 予約中
          to: 取置中
          イベント: 対象図書返却
        - from: 取置中
          to: 貸出済
          イベント: 予約者への貸出
        - from: 取置中
          to: 期限切れ
          イベント: 取置期限超過
        - from: 予約中
          to: 取消済
          イベント: 利用者による取消
        - from: 予約中
          to: 取消済
          イベント: 司書による取消

  # ----------------------------------------------------------
  # 条件・ビジネスルール
  # ----------------------------------------------------------
  ビジネスルール:
    - ID: BR-01
      ルール: 一般会員の同時貸出上限は5冊とする
      関連UC: [UC-05]

    - ID: BR-02
      ルール: 貸出期間は14日間とする
      関連UC: [UC-05]

    - ID: BR-03
      ルール: 同一蔵書に対する同一利用者の重複予約は不可とする
      関連UC: [UC-09]

    - ID: BR-04
      ルール: 延滞中の利用者は新規貸出・予約不可とする
      関連UC: [UC-05, UC-09]

    - ID: BR-05
      ルール: 予約取置期間は3営業日とする。超過した場合は次の予約者に繰り上げる
      関連UC: [UC-06, UC-09]

    - ID: BR-06
      ルール: 除籍済み蔵書に対して貸出・予約は行えない
      関連UC: [UC-04, UC-05, UC-09]

    - ID: BR-07
      ルール: 貸出中の蔵書は除籍できない（返却後に除籍する）
      関連UC: [UC-04]
