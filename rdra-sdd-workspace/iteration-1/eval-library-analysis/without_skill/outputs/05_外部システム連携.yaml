# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# 外部システム連携定義
# ============================================================

外部システム連携:

  - 連携先: 国立国会図書館 書誌データAPI
    連携方式: REST API (HTTPS)
    エンドポイント: https://ndlsearch.ndl.go.jp/api/opensearch
    プロトコル: OpenSearch
    レスポンス形式: XML (Dublin Core / DC-NDL)

    連携ユースケース:
      - UC-02 (蔵書を登録する)

    連携フロー:
      - ステップ: 1
        処理: ISBNをキーにAPIへリクエストを送信する
        リクエストパラメータ:
          - isbn: ISBN (10桁 or 13桁)
      - ステップ: 2
        処理: レスポンスから書誌データを抽出する
        取得項目:
          - タイトル (dc:title)
          - 著者 (dc:creator)
          - 出版社 (dc:publisher)
          - 出版年 (dc:date)
          - ページ数 (dcterms:extent)
          - 分類 (dc:subject / NDC)
          - 概要 (dc:description)
      - ステップ: 3
        処理: 取得した書誌データを蔵書登録画面にプリセットする

    エラーハンドリング:
      - 条件: API応答なし / タイムアウト
        対応: 手動入力にフォールバック。エラーメッセージを表示する。
      - 条件: 該当ISBNの書誌データなし
        対応: 該当なしを表示し、手動入力を促す。
      - 条件: レスポンス解析エラー
        対応: エラーログを記録し、手動入力にフォールバックする。

    非機能要件:
      - タイムアウト: 10秒
      - リトライ: 最大2回
      - レート制限: API提供元の利用規約に準拠する
