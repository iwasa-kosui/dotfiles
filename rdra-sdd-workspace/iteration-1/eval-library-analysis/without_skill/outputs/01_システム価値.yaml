# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# レイヤー1: システム価値
# ============================================================

システム価値:
  システム名: 社内図書館管理システム
  目的: |
    社内図書館の蔵書・貸出・予約業務を一元管理し、
    利用者の利便性向上と司書の業務効率化を実現する。

  # ----------------------------------------------------------
  # システムコンテキスト
  # ----------------------------------------------------------
  システムコンテキスト:
    対象システム: 社内図書館管理システム
    アクター:
      - 名前: 一般会員
        種別: 人間
        説明: 社内図書館を利用する社員。蔵書の検索、貸出、返却、予約を行う。
      - 名前: 司書
        種別: 人間
        説明: 図書館の運営を担当するスタッフ。蔵書の登録・管理、貸出・返却の処理、予約管理を行う。
    外部システム:
      - 名前: 国立国会図書館 書誌データAPI
        種別: 外部API
        説明: ISBN等をキーに書誌情報（タイトル、著者、出版社、出版年等）を取得する。

  # ----------------------------------------------------------
  # 要求モデル
  # ----------------------------------------------------------
  要求:
    - ID: REQ-01
      要求: 蔵書情報を正確かつ効率的に管理したい
      要求元: 司書
      理由: 手作業による蔵書台帳管理の負荷を削減し、データの正確性を担保するため

    - ID: REQ-02
      要求: 書誌データの手入力を最小化したい
      要求元: 司書
      理由: ISBNから自動取得することで登録作業の効率化と入力ミスの防止を図るため

    - ID: REQ-03
      要求: 貸出・返却状況をリアルタイムに把握したい
      要求元: 司書
      理由: 延滞管理や蔵書の所在把握を迅速に行うため

    - ID: REQ-04
      要求: 読みたい本を素早く見つけたい
      要求元: 一般会員
      理由: 業務時間中の検索負荷を最小限にするため

    - ID: REQ-05
      要求: 貸出中の本を予約して確実に借りたい
      要求元: 一般会員
      理由: 人気書籍を確実に入手する手段を提供するため

    - ID: REQ-06
      要求: 自分の貸出履歴・予約状況を確認したい
      要求元: 一般会員
      理由: 返却期限の把握や予約順の確認のため
