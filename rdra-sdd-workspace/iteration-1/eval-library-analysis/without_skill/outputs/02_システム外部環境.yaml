# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# レイヤー2: システム外部環境
# ============================================================

システム外部環境:

  # ----------------------------------------------------------
  # 業務モデル（ビジネスコンテキスト図）
  # ----------------------------------------------------------
  業務:
    - ID: BIZ-01
      業務名: 蔵書管理業務
      説明: 図書の登録・更新・除籍など蔵書のライフサイクルを管理する業務
      関連アクター: [司書]
      関連外部システム: [国立国会図書館 書誌データAPI]

    - ID: BIZ-02
      業務名: 貸出管理業務
      説明: 図書の貸出・返却・延滞管理を行う業務
      関連アクター: [一般会員, 司書]

    - ID: BIZ-03
      業務名: 予約管理業務
      説明: 貸出中図書の予約受付・予約順管理・予約取消を行う業務
      関連アクター: [一般会員, 司書]

  # ----------------------------------------------------------
  # 業務フロー
  # ----------------------------------------------------------
  業務フロー:

    - ID: BF-01
      業務名: 蔵書登録フロー
      アクター: 司書
      フロー:
        - ステップ: 1
          アクティビティ: ISBNをスキャンまたは入力する
        - ステップ: 2
          アクティビティ: 国立国会図書館APIから書誌データを取得する
        - ステップ: 3
          アクティビティ: 取得した書誌データを確認・補完する
        - ステップ: 4
          アクティビティ: 配架場所・管理番号を設定する
        - ステップ: 5
          アクティビティ: 蔵書として登録する

    - ID: BF-02
      業務名: 貸出フロー
      アクター: 一般会員
      フロー:
        - ステップ: 1
          アクティビティ: 蔵書を検索する
        - ステップ: 2
          アクティビティ: 貸出可能か確認する
        - ステップ: 3
          アクティビティ: 貸出申請する
        - ステップ: 4
          アクティビティ: 貸出処理が完了する（返却期限が設定される）

    - ID: BF-03
      業務名: 返却フロー
      アクター: 一般会員
      フロー:
        - ステップ: 1
          アクティビティ: 返却する図書を提示する
        - ステップ: 2
          アクティビティ: 返却処理を行う
        - ステップ: 3
          アクティビティ: 予約者がいれば予約者へ通知する

    - ID: BF-04
      業務名: 予約フロー
      アクター: 一般会員
      フロー:
        - ステップ: 1
          アクティビティ: 蔵書を検索する
        - ステップ: 2
          アクティビティ: 貸出中であることを確認する
        - ステップ: 3
          アクティビティ: 予約申請する
        - ステップ: 4
          アクティビティ: 予約が登録される（予約順が付与される）

    - ID: BF-05
      業務名: 延滞管理フロー
      アクター: 司書
      フロー:
        - ステップ: 1
          アクティビティ: 返却期限超過の貸出を検索する
        - ステップ: 2
          アクティビティ: 延滞者に督促通知を送る
        - ステップ: 3
          アクティビティ: 延滞状況を記録する

  # ----------------------------------------------------------
  # 利用シーン（ユースケース複合図に相当）
  # ----------------------------------------------------------
  利用シーン:
    - ID: SC-01
      シーン名: 新刊を受け入れるとき
      説明: 新しく購入した図書を蔵書として登録する
      関連業務: BIZ-01
      関連アクター: 司書

    - ID: SC-02
      シーン名: 本を借りるとき
      説明: 会員が読みたい本を検索し貸出する
      関連業務: BIZ-02
      関連アクター: 一般会員

    - ID: SC-03
      シーン名: 本を返すとき
      説明: 借りた本を返却する
      関連業務: BIZ-02
      関連アクター: 一般会員

    - ID: SC-04
      シーン名: 貸出中の本を予約するとき
      説明: 読みたい本が貸出中のため予約する
      関連業務: BIZ-03
      関連アクター: 一般会員

    - ID: SC-05
      シーン名: 延滞を管理するとき
      説明: 期限超過の貸出を把握し督促する
      関連業務: BIZ-02
      関連アクター: 司書

    - ID: SC-06
      シーン名: 蔵書を除籍するとき
      説明: 廃棄・紛失等により蔵書から除外する
      関連業務: BIZ-01
      関連アクター: 司書
