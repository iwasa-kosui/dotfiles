# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# トレーサビリティマトリクス
# 要求 → 業務 → 利用シーン → ユースケース → 画面 の追跡表
# ============================================================

トレーサビリティ:

  # 要求 → 業務
  要求_業務:
    - 要求: REQ-01 (蔵書情報を正確かつ効率的に管理したい)
      業務: [BIZ-01]
    - 要求: REQ-02 (書誌データの手入力を最小化したい)
      業務: [BIZ-01]
    - 要求: REQ-03 (貸出・返却状況をリアルタイムに把握したい)
      業務: [BIZ-02]
    - 要求: REQ-04 (読みたい本を素早く見つけたい)
      業務: [BIZ-02]
    - 要求: REQ-05 (貸出中の本を予約して確実に借りたい)
      業務: [BIZ-03]
    - 要求: REQ-06 (自分の貸出履歴・予約状況を確認したい)
      業務: [BIZ-02, BIZ-03]

  # 業務 → 利用シーン
  業務_利用シーン:
    - 業務: BIZ-01 (蔵書管理業務)
      利用シーン: [SC-01, SC-06]
    - 業務: BIZ-02 (貸出管理業務)
      利用シーン: [SC-02, SC-03, SC-05]
    - 業務: BIZ-03 (予約管理業務)
      利用シーン: [SC-04]

  # 利用シーン → ユースケース
  利用シーン_ユースケース:
    - 利用シーン: SC-01 (新刊を受け入れるとき)
      ユースケース: [UC-02, UC-03]
    - 利用シーン: SC-02 (本を借りるとき)
      ユースケース: [UC-01, UC-05, UC-07]
    - 利用シーン: SC-03 (本を返すとき)
      ユースケース: [UC-06, UC-07]
    - 利用シーン: SC-04 (貸出中の本を予約するとき)
      ユースケース: [UC-01, UC-09, UC-10, UC-11]
    - 利用シーン: SC-05 (延滞を管理するとき)
      ユースケース: [UC-08]
    - 利用シーン: SC-06 (蔵書を除籍するとき)
      ユースケース: [UC-04]

  # ユースケース → 画面
  ユースケース_画面:
    - UC: UC-01 (蔵書を検索する)
      画面: [SCR-02, SCR-03]
    - UC: UC-02 (蔵書を登録する)
      画面: [SCR-04]
    - UC: UC-03 (蔵書情報を編集する)
      画面: [SCR-05]
    - UC: UC-04 (蔵書を除籍する)
      画面: [SCR-05]
    - UC: UC-05 (図書を貸出する)
      画面: [SCR-03, SCR-07]
    - UC: UC-06 (図書を返却する)
      画面: [SCR-07]
    - UC: UC-07 (貸出履歴を確認する)
      画面: [SCR-06]
    - UC: UC-08 (延滞一覧を確認する)
      画面: [SCR-07]
    - UC: UC-09 (図書を予約する)
      画面: [SCR-03, SCR-08]
    - UC: UC-10 (予約を取り消す)
      画面: [SCR-08]
    - UC: UC-11 (予約状況を確認する)
      画面: [SCR-06, SCR-08]
