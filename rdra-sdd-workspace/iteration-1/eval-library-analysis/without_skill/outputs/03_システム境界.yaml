# ============================================================
# RDRA 要件定義: 社内図書館管理システム
# レイヤー3: システム境界
# ============================================================

システム境界:

  # ----------------------------------------------------------
  # ユースケース
  # ----------------------------------------------------------
  ユースケース:

    # --- 蔵書管理 ---
    - ID: UC-01
      名前: 蔵書を検索する
      アクター: [一般会員, 司書]
      事前条件: なし
      主フロー:
        - タイトル・著者・ISBN等のキーワードを入力する
        - 蔵書一覧から該当する図書を表示する
      事後条件: 検索結果が表示される
      関連利用シーン: [SC-02, SC-04]

    - ID: UC-02
      名前: 蔵書を登録する
      アクター: [司書]
      事前条件: なし
      主フロー:
        - ISBNを入力する
        - 国立国会図書館APIから書誌データを取得する
        - 書誌データを確認・編集する
        - 配架場所・管理番号を入力する
        - 蔵書として登録する
      代替フロー:
        - ISBN未登録の場合、手動で書誌情報を入力する
        - API接続失敗時、手動入力にフォールバックする
      事後条件: 蔵書が登録され貸出可能になる
      関連利用シーン: [SC-01]

    - ID: UC-03
      名前: 蔵書情報を編集する
      アクター: [司書]
      事前条件: 蔵書が登録済みであること
      主フロー:
        - 対象の蔵書を検索・選択する
        - 書誌情報・配架場所等を編集する
        - 変更を保存する
      事後条件: 蔵書情報が更新される
      関連利用シーン: [SC-01]

    - ID: UC-04
      名前: 蔵書を除籍する
      アクター: [司書]
      事前条件: 蔵書が登録済みであること。貸出中でないこと。
      主フロー:
        - 対象の蔵書を検索・選択する
        - 除籍理由を入力する
        - 除籍を確定する
      事後条件: 蔵書が除籍済みとなり貸出不可になる
      関連利用シーン: [SC-06]

    # --- 貸出管理 ---
    - ID: UC-05
      名前: 図書を貸出する
      アクター: [一般会員]
      事前条件: 蔵書が貸出可能であること
      主フロー:
        - 蔵書を選択する
        - 貸出申請する
        - 返却期限が設定され貸出が記録される
      代替フロー:
        - 貸出上限に達している場合、貸出不可とする
      事後条件: 貸出が記録され、蔵書ステータスが「貸出中」になる
      関連利用シーン: [SC-02]

    - ID: UC-06
      名前: 図書を返却する
      アクター: [一般会員, 司書]
      事前条件: 図書が貸出中であること
      主フロー:
        - 返却する図書を特定する
        - 返却処理を行う
        - 予約者がいる場合、次の予約者へ通知する
      事後条件: 貸出が完了し、蔵書ステータスが「貸出可能」または「予約取置中」になる
      関連利用シーン: [SC-03]

    - ID: UC-07
      名前: 貸出履歴を確認する
      アクター: [一般会員]
      事前条件: なし
      主フロー:
        - 自分の貸出履歴を表示する
        - 現在の貸出中図書と返却期限を確認する
      事後条件: 貸出履歴が表示される
      関連利用シーン: [SC-02, SC-03]

    - ID: UC-08
      名前: 延滞一覧を確認する
      アクター: [司書]
      事前条件: なし
      主フロー:
        - 返却期限超過の貸出一覧を表示する
        - 延滞者に督促通知を送信する
      事後条件: 督促通知が送信される
      関連利用シーン: [SC-05]

    # --- 予約管理 ---
    - ID: UC-09
      名前: 図書を予約する
      アクター: [一般会員]
      事前条件: 蔵書が貸出中であること
      主フロー:
        - 蔵書を選択する
        - 予約を申請する
        - 予約順が付与され予約が記録される
      代替フロー:
        - 既に同じ蔵書を予約済みの場合、重複予約不可とする
      事後条件: 予約が記録される
      関連利用シーン: [SC-04]

    - ID: UC-10
      名前: 予約を取り消す
      アクター: [一般会員, 司書]
      事前条件: 予約が存在すること
      主フロー:
        - 予約一覧から対象を選択する
        - 予約を取り消す
      事後条件: 予約が取り消され、後続の予約順が繰り上がる
      関連利用シーン: [SC-04]

    - ID: UC-11
      名前: 予約状況を確認する
      アクター: [一般会員]
      事前条件: なし
      主フロー:
        - 自分の予約一覧を表示する
        - 予約順位と対象図書の貸出状況を確認する
      事後条件: 予約状況が表示される
      関連利用シーン: [SC-04]

  # ----------------------------------------------------------
  # 画面（UIコンポーネント）
  # ----------------------------------------------------------
  画面:
    - ID: SCR-01
      名前: ログイン画面
      関連UC: []
      アクター: [一般会員, 司書]

    - ID: SCR-02
      名前: 蔵書検索画面
      関連UC: [UC-01]
      アクター: [一般会員, 司書]

    - ID: SCR-03
      名前: 蔵書詳細画面
      関連UC: [UC-01, UC-05, UC-09]
      アクター: [一般会員, 司書]

    - ID: SCR-04
      名前: 蔵書登録画面
      関連UC: [UC-02]
      アクター: [司書]

    - ID: SCR-05
      名前: 蔵書編集画面
      関連UC: [UC-03]
      アクター: [司書]

    - ID: SCR-06
      名前: マイページ画面
      関連UC: [UC-07, UC-11]
      アクター: [一般会員]

    - ID: SCR-07
      名前: 貸出管理画面
      関連UC: [UC-05, UC-06, UC-08]
      アクター: [司書]

    - ID: SCR-08
      名前: 予約管理画面
      関連UC: [UC-09, UC-10, UC-11]
      アクター: [一般会員, 司書]
